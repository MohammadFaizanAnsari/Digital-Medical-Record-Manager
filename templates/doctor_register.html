<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Doctor Registration</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, Helvetica, sans-serif;
    background:
    linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
    url("https://media.istockphoto.com/id/1179610553/photo/black-stethoscope-on-blue-background.jpg?s=612x612&w=0&k=20&c=GPljrNsqqI_RNAUEf2oMMf9RwVWRCvLECo0wjGYySDw=");

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;
}

/* ================= CONTAINER ================= */

.container{
    width:100%;
    max-width:420px;

    background:rgba(255,255,255,0.95);

    backdrop-filter: blur(8px);

    padding:35px 28px;

    border-radius:20px;

    box-shadow:0 12px 35px rgba(0,0,0,0.25);

    animation:fadeIn 0.7s ease;
}

/* ================= HEADING ================= */

h2{
    text-align:center;
    margin-bottom:25px;

    color:#1e3c72;

    font-size:30px;
    font-weight:bold;
}

h2 i{
    color:#00b4db;
    margin-right:8px;
}

/* ================= INPUTS ================= */

.input-group{
    margin-bottom:18px;
}

.input-group input{
    width:100%;

    padding:14px 15px;

    border-radius:12px;

    border:1px solid #d0d0d0;

    font-size:16px;

    outline:none;

    transition:0.3s;
}

.input-group input:focus{
    border-color:#4facfe;

    box-shadow:0 0 10px rgba(79,172,254,0.35);
}

/* ================= BUTTON ================= */

button{
    width:100%;

    padding:14px;

    border:none;

    border-radius:12px;

    background:linear-gradient(135deg,#4facfe,#00c6fb);

    color:white;

    font-size:17px;
    font-weight:bold;

    cursor:pointer;

    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);

    background:linear-gradient(135deg,#2c8de0,#0099cc);

    box-shadow:0 8px 18px rgba(0,0,0,0.2);
}

/* ================= FLASH MESSAGE ================= */

.flash{
    background:#ffe5e5;

    color:#d8000c;

    padding:12px;

    border-radius:10px;

    margin-bottom:18px;

    text-align:center;

    font-size:14px;
}

/* ================= ANIMATION ================= */

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* ================= MOBILE RESPONSIVE ================= */

@media(max-width:600px){

    body{
        padding:15px;
        align-items:center;
    }

    .container{
        width:100%;
        padding:28px 22px;
        border-radius:18px;
    }

    h2{
        font-size:26px;
        margin-bottom:22px;
    }

    .input-group input{
        font-size:16px;
        padding:15px;
    }

    button{
        font-size:16px;
        padding:15px;
    }
}

@media(max-width:400px){

    .container{
        padding:24px 18px;
    }

    h2{
        font-size:23px;
    }
}

</style>
</head>

<body>

<div class="container">

<h2>
<i class="fa-solid fa-user-doctor"></i>
Doctor Registration
</h2>

{% with messages = get_flashed_messages() %}
{% if messages %}
<div class="flash">
{% for msg in messages %}
<p>{{msg}}</p>
{% endfor %}
</div>
{% endif %}
{% endwith %}

<form method="POST">

<div class="input-group">
<input type="text" name="name" placeholder="Doctor Name" required>
</div>

<div class="input-group">
<input type="email" name="email" placeholder="Email Address" required>
</div>

<div class="input-group">
<input type="password" name="password" placeholder="Password" required>
</div>

<div class="input-group">
<input type="text" name="clinic" placeholder="Clinic Name" required>
</div>

<div class="input-group">
<input type="text" name="address" placeholder="Clinic Address" required>
</div>

<button type="submit">
<i class="fa-solid fa-user-plus"></i>
Register
</button>

</form>

</div>

</body>
</html>
