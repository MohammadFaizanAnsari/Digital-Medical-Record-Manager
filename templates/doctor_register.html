<!DOCTYPE html>
<html>
<head>
<title>Doctor Registration</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    background-image: url("https://media.istockphoto.com/id/1179610553/photo/black-stethoscope-on-blue-background.jpg?s=612x612&w=0&k=20&c=GPljrNsqqI_RNAUEf2oMMf9RwVWRCvLECo0wjGYySDw=");
    background-size: cover;        /* makes image cover full screen */
    background-position: center;   /* center the image */
    background-repeat: no-repeat;  /* prevent repeating */
    background-attachment: fixed;  /* smooth effect */
}

.container{
    background:white;
    padding:35px;
    border-radius:10px;
    width:380px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:25px;
}

.input-group{
    margin-bottom:15px;
}

input{
    width:100%;
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:14px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#4facfe;
    color:white;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#2c8de0;
}

.flash{
    color:red;
    text-align:center;
    margin-bottom:10px;
}

</style>
</head>

<body>

<div class="container">

<h2><i class="fa-solid fa-user-doctor"></i> Doctor Registration</h2>

{% with messages = get_flashed_messages() %}
{% if messages %}
<div class="flash">
{% for msg in messages %}
<p>{{msg}}</p>
{% endfor %}
</div>
{% endif %}
{% endwith %}

<form method="POST">

<div class="input-group">
<input type="text" name="name" placeholder="Doctor Name" required>
</div>

<div class="input-group">
<input type="email" name="email" placeholder="Email Address" required>
</div>

<div class="input-group">
<input type="password" name="password" placeholder="Password" required>
</div>

<div class="input-group">
<input type="text" name="clinic" placeholder="Clinic Name" required>
</div>

<div class="input-group">
<input type="text" name="address" placeholder="Clinic Address" required>
</div>

<button type="submit">
<i class="fa-solid fa-user-plus"></i> Register
</button>

</form>

</div>

</body>
</html>
