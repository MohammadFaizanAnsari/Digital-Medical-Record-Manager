{% extends "base.html" %}

{% block content %}

<!-- ==========================================================================
     ULTRA PREMIUM MEDICAL APPOINTMENT DASHBOARD
     ========================================================================== -->

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>

<style>

/* ==========================================================================
   ROOT VARIABLES
   ========================================================================== */

:root{

    --primary:#2563eb;
    --primary-dark:#1d4ed8;
    --primary-light:#dbeafe;

    --secondary:#0f172a;
    --secondary-soft:#1e293b;

    --surface:#ffffff;
    --surface-soft:#f8fafc;

    --success:#16a34a;
    --warning:#f59e0b;
    --danger:#ef4444;

    --border:#e2e8f0;
    --text:#0f172a;
    --muted:#64748b;

    --glass:rgba(255,255,255,0.78);

    --shadow-sm:0 4px 12px rgba(15,23,42,0.05);
    --shadow-md:0 12px 28px rgba(15,23,42,0.08);
    --shadow-lg:0 22px 55px rgba(15,23,42,0.12);

    --radius-xl:34px;
    --radius-lg:26px;
    --radius-md:18px;
}

/* ==========================================================================
   GLOBAL
   ========================================================================== */

body{

    font-family:'Plus Jakarta Sans',sans-serif !important;

    background:
    radial-gradient(circle at top left, rgba(37,99,235,0.08), transparent 28%),
    radial-gradient(circle at bottom right, rgba(14,165,233,0.08), transparent 24%),
    linear-gradient(180deg,#f8fbff,#eef4ff);

    min-height:100vh;
}

/* Floating background glow */

body::before{
    content:"";
    position:fixed;
    top:-150px;
    left:-120px;

    width:400px;
    height:400px;

    background:rgba(37,99,235,0.12);

    border-radius:50%;

    filter:blur(100px);

    z-index:-1;
}

body::after{
    content:"";
    position:fixed;
    bottom:-120px;
    right:-120px;

    width:350px;
    height:350px;

    background:rgba(14,165,233,0.10);

    border-radius:50%;

    filter:blur(100px);

    z-index:-1;
}

/* ==========================================================================
   MAIN LAYOUT
   ========================================================================== */

.dashboard-wrapper{
    padding:24px 0 30px;
}

.dashboard-grid{
    display:grid;
    grid-template-columns:minmax(0,1fr) 420px;
    gap:28px;
    align-items:start;
}

@media(max-width:1200px){

    .dashboard-grid{
        grid-template-columns:1fr;
    }
}

/* ==========================================================================
   ULTRA GLASS CARD
   ========================================================================== */

.ultra-card{

    background:var(--glass);

    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,0.5);

    border-radius:var(--radius-xl);

    overflow:hidden;

    box-shadow:
    0 10px 30px rgba(15,23,42,0.05),
    inset 0 1px 0 rgba(255,255,255,0.5);

    position:relative;

    animation:fadeUp 0.7s ease;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.ultra-card::before{
    content:"";
    position:absolute;
    top:0;
    left:0;

    width:100%;
    height:5px;

    background:
    linear-gradient(
        90deg,
        #2563eb,
        #3b82f6,
        #0ea5e9
    );
}

/* ==========================================================================
   HEADER
   ========================================================================== */

.dashboard-header{

    padding:32px 34px 24px;

    border-bottom:1px solid rgba(226,232,240,0.7);

    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
}

.header-content h2{

    margin:0;

    font-size:1.9rem;
    font-weight:800;

    color:var(--secondary);

    letter-spacing:-0.7px;
}

.header-content p{

    margin:10px 0 0;

    color:var(--muted);

    font-size:0.95rem;
    font-weight:500;
}

/* ==========================================================================
   LIVE BADGE
   ========================================================================== */

.live-badge{

    display:flex;
    align-items:center;
    gap:10px;

    background:
    linear-gradient(
        135deg,
        rgba(37,99,235,0.10),
        rgba(59,130,246,0.10)
    );

    padding:13px 18px;

    border-radius:18px;

    border:1px solid rgba(37,99,235,0.12);
}

.live-dot{

    width:11px;
    height:11px;

    background:#22c55e;

    border-radius:50%;

    position:relative;
}

.live-dot::after{

    content:"";

    position:absolute;

    inset:-5px;

    border-radius:50%;

    border:2px solid rgba(34,197,94,0.3);

    animation:pulse 2s infinite;
}

@keyframes pulse{

    0%{
        transform:scale(0.7);
        opacity:1;
    }

    100%{
        transform:scale(1.8);
        opacity:0;
    }
}

.live-badge span{

    font-size:0.88rem;
    font-weight:700;

    color:var(--secondary);
}

/* ==========================================================================
   CALENDAR AREA
   ========================================================================== */

.calendar-area{
    padding:24px;
}

/* Toolbar */

.fc .fc-toolbar{

    margin-bottom:22px !important;

    gap:12px;
    flex-wrap:wrap;
}

.fc-toolbar-title{

    font-size:1.5rem !important;
    font-weight:800 !important;

    color:var(--secondary);

    letter-spacing:-0.5px;
}

/* Buttons */

.fc .fc-button{

    border:none !important;

    background:white !important;

    color:#334155 !important;

    border-radius:16px !important;

    padding:10px 16px !important;

    font-size:0.84rem !important;
    font-weight:700 !important;

    box-shadow:var(--shadow-sm);

    transition:0.25s ease;
}

.fc .fc-button:hover{

    transform:translateY(-2px);

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #3b82f6
    ) !important;

    color:white !important;

    box-shadow:
    0 14px 24px rgba(37,99,235,0.25);
}

.fc .fc-button-active{

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #3b82f6
    ) !important;

    color:white !important;
}

/* Calendar Grid */

.fc-theme-standard td,
.fc-theme-standard th{
    border-color:#eef2f7 !important;
}

.fc-theme-standard .fc-scrollgrid{
    border:none !important;
}

.fc-col-header-cell{

    background:#f8fafc;

    padding:13px 0 !important;
}

.fc-col-header-cell-cushion{

    color:#475569 !important;

    text-decoration:none !important;

    font-size:0.78rem;
    font-weight:800;

    letter-spacing:0.4px;
}

/* Day Slots */

.fc-daygrid-day-frame{

    min-height:78px !important;
    height:78px !important;
}

.fc-daygrid-day{

    transition:0.2s ease;

    background:white;
}

.fc-daygrid-day:hover{

    background:#f8fbff;
}

.fc .fc-day-today{

    background:
    linear-gradient(
        180deg,
        rgba(37,99,235,0.08),
        rgba(37,99,235,0.02)
    ) !important;
}

.fc-daygrid-day-number{

    color:#1e293b !important;

    text-decoration:none !important;

    font-size:0.82rem;
    font-weight:700;

    padding:8px !important;
}

/* ==========================================================================
   EVENT COLORS
   ========================================================================== */

.low-load{

    background:
    linear-gradient(
        135deg,
        #16a34a,
        #22c55e
    ) !important;

    color:white !important;

    border:none !important;

    box-shadow:
    0 8px 18px rgba(34,197,94,0.25);
}

.medium-load{

    background:
    linear-gradient(
        135deg,
        #f59e0b,
        #fbbf24
    ) !important;

    color:white !important;

    border:none !important;

    box-shadow:
    0 8px 18px rgba(245,158,11,0.25);
}

.high-load{

    background:
    linear-gradient(
        135deg,
        #ef4444,
        #f87171
    ) !important;

    color:white !important;

    border:none !important;

    box-shadow:
    0 8px 18px rgba(239,68,68,0.25);
}

.fc-event{

    border-radius:12px !important;

    padding:4px 8px !important;

    font-size:0.7rem !important;
    font-weight:800 !important;

    transition:0.2s ease;
}

.fc-event:hover{
    transform:translateY(-1px);
}

/* ==========================================================================
   SIDEBAR
   ========================================================================== */

.sidebar-header{

    padding:32px 30px 22px;

    border-bottom:1px solid rgba(226,232,240,0.7);
}

.sidebar-header h3{

    margin:0;

    font-size:1.5rem;
    font-weight:800;

    color:var(--secondary);
}

.sidebar-header p{

    margin:10px 0 0;

    color:var(--muted);

    font-size:0.92rem;
}

/* ==========================================================================
   APPOINTMENT LIST
   ========================================================================== */

.appointment-list{

    padding:22px;

    max-height:760px;

    overflow-y:auto;
}

.appointment-list::-webkit-scrollbar{
    width:5px;
}

.appointment-list::-webkit-scrollbar-thumb{

    background:#cbd5e1;

    border-radius:20px;
}

/* ==========================================================================
   APPOINTMENT CARD
   ========================================================================== */

.appointment-card{

    background:
    linear-gradient(
        180deg,
        rgba(255,255,255,0.96),
        rgba(248,250,252,0.96)
    );

    border:1px solid rgba(226,232,240,0.9);

    border-radius:28px;

    padding:22px;

    margin-bottom:20px;

    position:relative;

    overflow:hidden;

    transition:0.3s ease;

    animation:cardPop 0.5s ease;
}

@keyframes cardPop{

    from{
        opacity:0;
        transform:scale(0.95);
    }

    to{
        opacity:1;
        transform:scale(1);
    }
}

.appointment-card:hover{

    transform:translateY(-4px);

    border-color:#bfdbfe;

    box-shadow:
    0 20px 35px rgba(15,23,42,0.08);
}

.appointment-card::before{

    content:"";

    position:absolute;

    top:0;
    right:0;

    width:6px;
    height:100%;

    background:
    linear-gradient(
        180deg,
        #2563eb,
        #0ea5e9
    );
}

/* ==========================================================================
   PATIENT SECTION
   ========================================================================== */

.patient-top{

    display:flex;
    gap:16px;
    align-items:flex-start;
}

.patient-avatar{

    width:60px;
    height:60px;

    border-radius:20px;

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #3b82f6
    );

    display:flex;
    align-items:center;
    justify-content:center;

    color:white;

    font-size:1.2rem;
    font-weight:800;

    flex-shrink:0;

    box-shadow:
    0 12px 24px rgba(37,99,235,0.22);
}

.patient-info{
    flex:1;
}

.patient-info h4{

    margin:0;

    font-size:1.02rem;
    font-weight:800;

    color:var(--secondary);
}

.patient-phone{

    margin-top:10px;

    display:flex;
    align-items:center;
    gap:9px;

    color:var(--muted);

    font-size:0.88rem;
}

.patient-phone i{
    color:#2563eb;
}

/* ==========================================================================
   FOOTER
   ========================================================================== */

.patient-footer{

    margin-top:22px;

    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;

    flex-wrap:wrap;
}

/* Status */

.status-badge{

    padding:8px 16px;

    border-radius:999px;

    font-size:0.72rem;
    font-weight:800;

    text-transform:uppercase;
    letter-spacing:0.4px;
}

.status-badge.approved{
    background:#ecfdf3;
    color:#15803d;
    border:1px solid #bbf7d0;
}

.status-badge.pending{
    background:#fff7ed;
    color:#c2410c;
    border:1px solid #fed7aa;
}

.status-badge.rejected{
    background:#fef2f2;
    color:#b91c1c;
    border:1px solid #fecaca;
}

/* ==========================================================================
   BUTTON
   ========================================================================== */

.profile-btn{

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #3b82f6
    );

    color:white;
    text-decoration:none;

    padding:12px 18px;

    border-radius:16px;

    font-size:0.82rem;
    font-weight:700;

    display:flex;
    align-items:center;
    gap:10px;

    transition:0.25s ease;

    box-shadow:
    0 12px 24px rgba(37,99,235,0.22);
}

.profile-btn:hover{

    color:white;

    transform:translateY(-2px);

    box-shadow:
    0 16px 30px rgba(37,99,235,0.3);
}

/* ==========================================================================
   EMPTY STATE
   ========================================================================== */

.empty-state{

    text-align:center;

    padding:80px 20px;
}

.empty-state i{

    font-size:3.5rem;

    color:#cbd5e1;

    margin-bottom:18px;
}

.empty-state h4{

    margin:0 0 10px;

    color:#334155;

    font-size:1.1rem;
    font-weight:800;
}

.empty-state p{

    margin:0;

    color:#64748b;

    font-size:0.92rem;
}

/* ==========================================================================
   MOBILE
   ========================================================================== */

@media(max-width:768px){

    .dashboard-header{
        padding:24px 20px 18px;
    }

    .calendar-area{
        padding:12px;
    }

    .sidebar-header{
        padding:24px 22px 18px;
    }

    .appointment-list{
        padding:16px;
    }

    .fc .fc-toolbar{
        flex-direction:column;
        align-items:center !important;
    }

    .fc-toolbar-title{
        font-size:1.1rem !important;
        text-align:center;
    }

    .fc .fc-button{
        padding:8px 12px !important;
        font-size:0.76rem !important;
    }

    .fc-daygrid-day-frame{
        min-height:62px !important;
        height:62px !important;
    }

    .fc-daygrid-day-number{
        font-size:0.72rem !important;
        padding:5px !important;
    }

    .patient-footer{
        flex-direction:column;
        align-items:stretch;
    }

    .profile-btn{
        width:100%;
        justify-content:center;
    }
}

</style>

<div class="container dashboard-wrapper">

    <div class="dashboard-grid">

        <!-- CALENDAR -->
        <div class="ultra-card">

            <div class="dashboard-header">

                <div class="header-content">
                    <h2>Appointment Calendar</h2>
                    <p>Advanced smart scheduling and patient appointment management</p>
                </div>

                <div class="live-badge">
                    <div class="live-dot"></div>
                    <span>System Active</span>
                </div>

            </div>

            <div class="calendar-area">
                <div id="calendar"></div>
            </div>

        </div>

        <!-- APPOINTMENTS -->
        <div class="ultra-card">

            <div class="sidebar-header">
                <h3>Today's Focus</h3>
                <p id="selectedDateText">
                    Select a date from the calendar
                </p>
            </div>

            <div class="appointment-list" id="appointmentTable">

                <div class="empty-state">
                    <i class="fa-regular fa-calendar-days"></i>
                    <h4>No Date Selected</h4>
                    <p>Choose a date to view appointment schedules</p>
                </div>

            </div>

        </div>

    </div>

</div>

<script>

document.addEventListener('DOMContentLoaded', function () {

    var calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {

        initialView: 'dayGridMonth',

        height: "auto",

        fixedWeekCount: false,

        dayMaxEvents: 2,

        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: ''
        },

        events: function(fetchInfo, successCallback, failureCallback){

            fetch('/calendar_data')

            .then(response => response.json())

            .then(events => {

                const updatedEvents = events.map(event => {

                    let count = 0;

                    if(event.title){

                        const match = event.title.match(/\d+/);

                        if(match){
                            count = parseInt(match[0]);
                        }
                    }

                    if(count >= 1 && count <= 5){

                        event.className = 'low-load';

                    }else if(count > 5 && count <= 8){

                        event.className = 'medium-load';

                    }else if(count > 8){

                        event.className = 'high-load';
                    }

                    return event;
                });

                successCallback(updatedEvents);

            })

            .catch(error => failureCallback(error));
        },

        eventContent: function(arg) {

            let container = document.createElement('div');

            container.innerHTML = `
                <div style="display:flex;align-items:center;gap:6px;">
                    <i class="fa-solid fa-calendar-check"></i>
                    <span>${arg.event.title}</span>
                </div>
            `;

            return { domNodes: [container] };
        },

        dateClick: function(info) {

            document.getElementById("selectedDateText").innerHTML =
                `<i class="fa-regular fa-calendar"></i> ${info.dateStr}`;

            fetch("/appointments_by_date?date=" + info.dateStr)

            .then(res => res.json())

            .then(data => {

                let table = document.getElementById("appointmentTable");

                if (!data.appointments || data.appointments.length === 0) {

                    table.innerHTML = `
                        <div class="empty-state">
                            <i class="fa-regular fa-calendar-xmark"></i>
                            <h4>No Appointments</h4>
                            <p>No schedules available for this date</p>
                        </div>
                    `;

                    return;
                }

                table.innerHTML = data.appointments.map(a => `

                    <div class="appointment-card">

                        <div class="patient-top">

                            <div class="patient-avatar">
                                ${a.name.charAt(0).toUpperCase()}
                            </div>

                            <div class="patient-info">

                                <h4>${a.name}</h4>

                                <div class="patient-phone">
                                    <i class="fa-solid fa-phone"></i>
                                    <span>${a.phone}</span>
                                </div>

                            </div>

                        </div>

                        <div class="patient-footer">

                            <span class="status-badge ${a.status.toLowerCase()}">
                                ${a.status}
                            </span>

                            <a href="/patient/${a.patient_id}" class="profile-btn">
                                <i class="fa-solid fa-user"></i>
                                View Profile
                            </a>

                        </div>

                    </div>

                `).join('');

            });

        }

    });

    calendar.render();

});

</script>

{% endblock %}
